<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Portal Login Ujian</title>
<style>
:root{
  color-scheme: light dark;
}
*{box-sizing:border-box;margin:0;padding:0}

html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  background: linear-gradient(135deg,#1d4ed8,#334155);
  /* Mengaktifkan scroll alami secara agresif */
  overflow-y: auto !important;
  -webkit-overflow-scrolling: touch;
}

/* CONTAINER UTAMA: Menggunakan posisi absolut agar tidak terkunci oleh tinggi layar */
.scroll-container {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  min-height: 100%;
  display: block; /* Menghindari Flexbox yang merusak scroll mobile */
  padding: 40px 20px 0px;
}

.card{
  width: min(100%,460px);
  background: rgba(20,20,20,.88);
  backdrop-filter: blur(10px);
  border-radius: 28px;
  padding: 28px;
  box-shadow: 0 12px 40px rgba(0,0,0,.35);
  animation: fade .45s ease;
  
  /* Tengahkan kartu secara manual tanpa flexbox */
  margin: 0 auto; 
  position: relative;
}

/* SPACER GAIB: Memberikan ruang kosong di bawah kartu agar user bisa scroll bebas ke bawah saat keyboard aktif */
.keyboard-spacer {
  height: 380px; /* Tinggi ruang kosong penahan keyboard */
  display: block;
  pointer-events: none; /* Agar tidak bisa diklik */
}

@keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.logo{display:block;margin:0 auto 16px;width:clamp(110px,32vw,150px);height:auto}
h1{text-align:center;font-size:clamp(1.5rem,5vw,2rem);color:#fff}
h2{text-align:center;font-size:clamp(1rem,3.8vw,1.2rem);margin:.7rem 0;color:#e8e8e8}
p{text-align:center;color:#d7d7d7;margin-bottom:1.4rem}
label{display:block;color:#fff;font-weight:bold;margin:.7rem 0 .35rem}

input{
  font-size:16px; /* Wajib 16px agar iOS Safari tidak nge-zoom otomatis */
  width:100%; 
  padding:15px 16px; 
  border-radius:14px; 
  border: 2px solid rgba(255, 255, 255, 0.2); /* Border default pada mode gelap */
  background: rgba(255, 255, 255, 0.07);
  color: #fff;
  transition: all 0.3s ease;
}
input:focus{
  outline: none;
  border-color: #2563eb; /* Warna border biru cerah saat fokus */
  box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.25);
}

button{
 width:100%; margin-top:18px; padding:15px; border:none; border-radius:14px;
 font-size:17px; font-weight:bold; background:#2563eb; color:#fff;
 transition:.2s;
}
button:hover{transform:translateY(-1px)}
#status{margin-top:14px; min-height:1.4em; color:#fde68a; text-align:center}

@media (prefers-color-scheme: light){
 body{background:linear-gradient(160deg,#dbeafe,#cbd5e1)}
 .card{background:rgba(255,255,255,.92)}
 h1,h2,label{color:#111}
 p{color:#444}
 input {
   border: 2px solid #cbd5e1; /* Border default abu-abu/biru lembut pada mode terang */
   background: #ffffff;
   color: #111;
 }
 input:focus {
   border-color: #2563eb;
   box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
 }
}
</style>
</head>
<body>

<div class="scroll-container">
  <div class="card">
    <img src="logo.png" class="logo">
    <h1>SMP PGRI 1 CIBINONG</h1>
    <h2>ASESMEN SUMATIF TENGAH SEMESTER GANJIL</h2>
    <p>Tahun Ajaran 2026/2027</p>
    <form id="loginForm">
      <label>ID Peserta</label>
      <input id="peserta" autocomplete="off" placeholder="Contoh: P0001">
      <label>Password / PIN Akses</label>
      <input id="password" type="password" placeholder="Masukkan Password">
      <button id="loginBtn" type="submit">LOGIN</button>
      <div id="status"></div>
    </form>
  </div>
  
  <div class="keyboard-spacer"></div>
</div>

<script>
const BACKEND_URL="https://portal-ujian-backend-eyg4.vercel.app/api/login";
const REDIRECT_URL="https://sites.google.com/view/assessment-vhego/portal-2-ujian";

// Dorong input ke tengah pandangan secara paksa sesaat setelah kolom di-tap
document.querySelectorAll("input").forEach(el => {
  el.addEventListener("focus", () => {
    setTimeout(() => {
      el.scrollIntoView({ behavior: "smooth", block: "center" });
    }, 400); // Delay ditambahkan sedikit agar sinkron dengan animasi keyboard HP
  });
});

// Proses Form Login
loginForm.addEventListener("submit",async(e)=>{
 e.preventDefault();
 loginBtn.disabled=true;
 status.textContent="Memverifikasi login...";
 try{
   const r=await fetch(BACKEND_URL,{
     method:"POST",
     headers:{"Content-Type":"application/json"},
     body:JSON.stringify({
       peserta:peserta.value.trim(),
       password:password.value.trim()
     })
   });
   const j=await r.json();
   if(j.success){
     status.textContent="Login berhasil, mengalihkan...";
     setTimeout(()=>location.href=REDIRECT_URL,900);
   }else{
     status.textContent="ID Peserta atau Password salah.";
     loginBtn.disabled=false;
   }
 }catch{
   status.textContent="Server sedang sibuk.";
   loginBtn.disabled=false;
 }
});
</script>
</body>
</html>
