<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
<title>Portal Login Ujian</title>
<style>
:root{
  color-scheme: light dark;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Arial,Helvetica,sans-serif;
  margin:0;
  min-height: 100dvh;
  display:flex;
  justify-content:center; /* Pusatkan kartu secara horizontal */
  align-items:center;    /* Pusatkan kartu secara vertikal */
  padding:20px;
  background:linear-gradient(135deg,#1d4ed8,#334155);
  overflow-y:auto;
}
.card{
  width:min(100%,460px);
  background:rgba(20,20,20,.88);
  backdrop-filter:blur(10px);
  border-radius:28px;
  padding:28px;
  box-shadow:0 12px 40px rgba(0,0,0,.35);
  animation:fade .45s ease;
  margin: auto 0; /* Memastikan margin aman saat orientasi landscape atau layar pendek */
}
@keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.logo{display:block;margin:0 auto 16px;width:clamp(110px,32vw,150px);height:auto}
h1{text-align:center;font-size:clamp(1.5rem,5vw,2rem);color:#fff}
h2{text-align:center;font-size:clamp(1rem,3.8vw,1.2rem);margin:.7rem 0;color:#e8e8e8}
p{text-align:center;color:#d7d7d7;margin-bottom:1.4rem}
label{display:block;color:#fff;font-weight:bold;margin:.7rem 0 .35rem}
input{
  font-size:16px; /* Mencegah auto-zoom otomatis di iOS Safari */
  width:100%;padding:15px 16px;border-radius:14px;border:none;
}
input:focus{outline:2px solid #60a5fa}
button{
 width:100%;margin-top:18px;padding:15px;border:none;border-radius:14px;
 font-size:17px;font-weight:bold;background:#2563eb;color:#fff;
 transition:.2s;
}
button:hover{transform:translateY(-1px)}
#status{margin-top:14px;min-height:1.4em;color:#fde68a;text-align:center}

@media (prefers-color-scheme: light){
 body{background:linear-gradient(160deg,#dbeafe,#cbd5e1)}
 .card{background:rgba(255,255,255,.92)}
 h1,h2,label{color:#111}
 p{color:#444}
}

/* Memberikan ruang scroll tambahan di bagian bawah saat keyboard aktif di layar kecil */
@media (max-height: 600px) {
  body {
    align-items: flex-start;
  }
  .card {
    margin-top: 20px;
    margin-bottom: 180px; /* Ruang kosong agar input bisa di-scroll ke atas keyboard */
  }
}
</style>
</head>
<body>
<div class="card">
<img src="logo.png" class="logo">
<h1>SMP PGRI 1 CIBINONG</h1>
<h2>ASESMEN SUMATIF TENGAH SEMESTER GANJIL</h2>
<p>Tahun Ajaran 2026/2027</p>
<form id="loginForm">
<label>ID Peserta</label>
<input id="peserta" autocomplete="off" placeholder="Contoh: P0001">
<label>Password / PIN Akses</label>
<input id="password" type="password" placeholder="Masukkan Password">
<button id="loginBtn" type="submit">LOGIN</button>
<div id="status"></div>
</form>
</div>

<script>
const BACKEND_URL="https://portal-ujian-backend-eyg4.vercel.app/api/login";
const REDIRECT_URL="https://sites.google.com/view/assessment-vhego/portal-2-ujian";

// Posisikan input ke tengah layar secara mulus saat ditekan (fokus)
document.querySelectorAll("input").forEach(el => {
  el.addEventListener("focus", () => {
    setTimeout(() => {
      el.scrollIntoView({ behavior: "smooth", block: "center" });
    }, 300);
  });
});

loginForm.addEventListener("submit",async(e)=>{
 e.preventDefault();
 loginBtn.disabled=true;
 status.textContent="Memverifikasi login...";
 try{
   const r=await fetch(BACKEND_URL,{
     method:"POST",
     headers:{"Content-Type":"application/json"},
     body:JSON.stringify({
       peserta:peserta.value.trim(),
       password:password.value.trim()
     })
   });
   const j=await r.json();
   if(j.success){
     status.textContent="Login berhasil, mengalihkan...";
     setTimeout(()=>location.href=REDIRECT_URL,900);
   }else{
     status.textContent="ID Peserta atau Password salah.";
     loginBtn.disabled=false;
   }
 }catch{
   status.textContent="Server sedang sibuk.";
   loginBtn.disabled=false;
 }
});
</script>
</body>
</html>
