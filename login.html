<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Portal Ujian - SMP PGRI 1 Cibinong</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            background-color: #1e1e1e;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #2d2d2d;
        }

        .header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #00adb5;
            margin-bottom: 5px;
        }

        .header h2 {
            font-size: 1.1rem;
            font-weight: 400;
            color: #eeeeee;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .header .ta {
            font-size: 0.9rem;
            color: #888888;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: #b3b3b3;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background-color: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 6px;
            color: #ffffff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00adb5;
            box-shadow: 0 0 8px rgba(0, 173, 181, 0.4);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #00adb5;
            border: none;
            border-radius: 6px;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: #008c95;
        }

        .error-message {
            color: #ff5252;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
        }

        /* Optimasi Tampilan untuk Layar HP */
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
            .header h1 {
                font-size: 1.25rem;
            }
            .header h2 {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="header">
        <h1>SMP PGRI 1 CIBINONG</h1>
        <h2>ASESMEN SUMATIF AKHIR TAHUN</h2>
        <div class="ta">Tahun Ajaran 2025/2026</div>
    </div>

    <form id="loginForm">
        <div class="input-group">
            <label for="username">ID Peserta</label>
            <input type="text" id="username" placeholder="Masukkan ID Peserta" required autocomplete="off">
        </div>
        
        <div class="input-group">
            <label for="password">PIN / Password</label>
            <input type="password" id="password" placeholder="Masukkan Password" required>
        </div>

        <button type="submit" class="btn-login">LOGIN</button>
        <div id="errorMessage" class="error-message">ID Peserta atau Password salah!</div>
    </form>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const errorDiv = document.getElementById('errorMessage');
        
        errorDiv.style.display = 'none';

        try {
            // Mengarah ke API backend di Vercel (Ganti dengan URL production Vercel Anda nanti)
            const response = await fetch('https://portal-ujian-backend.vercel.app/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (response.ok && data.success) {
                // Redirect ke link portal ujian jika validasi berhasil
                window.location.href = data.redirectUrl;
            } else {
                errorDiv.textContent = data.message || "ID Peserta atau Password salah!";
                errorDiv.style.display = 'block';
            }
        } catch (error) {
            errorDiv.textContent = "Terjadi kesalahan jaringan. Silakan coba lagi.";
            errorDiv.style.display = 'block';
        }
    });
</script>

</body>
</html>
